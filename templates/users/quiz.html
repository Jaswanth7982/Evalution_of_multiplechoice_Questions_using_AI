{% extends 'users/user_base.html' %}
{% block title %}Take Quiz - QuizGenix{% endblock %}
{% block content %}
<section class="py-16">
  <div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8">
    <h2 class="text-4xl font-extrabold text-center mb-8 animate-fadeInLeft text-transparent bg-clip-text bg-gradient-to-r from-red-400 to-indigo-500">
      Take Your Quiz
    </h2>
    <form method="post" action="{% url 'result' %}" class="bg-gray-800 bg-opacity-85 p-8 rounded-2xl shadow-xl animate-fadeInLeft" style="animation-delay: 0.1s;">
      {% csrf_token %}
      {% for mcq in mcqs %}
        <div class="mb-8">
          <p class="text-xl font-semibold text-gray-200 mb-4">
            Q{{ forloop.counter }}: {{ mcq.question }}
          </p>
          <div class="space-y-3">
            {% for option in mcq.options %}
              <label class="flex items-center space-x-3 text-gray-300 cursor-pointer">
                <input type="radio" name="question_{{ forloop.parentloop.counter0 }}" value="{{ option }}" class="input-field w-5 h-5 text-teal-500 border-gray-700 focus:ring-teal-500 transition duration-300" required>
                <span class="text-base">{{ option }}</span>
              </label>
            {% endfor %}
          </div>
        </div>
      {% endfor %}
      <div class="text-center">
        <button type="submit" class="inline-block btn-gradient text-white font-semibold px-8 py-3 rounded-full text-lg transition duration-300 ease-in-out hover-pulseGlow animate-fadeInLeft" style="animation-delay: 0.2s;">
          Submit Quiz
        </button>
      </div>
    </form>
  </div>
</section>
{% endblock %}
