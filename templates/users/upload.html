{% extends 'users/user_base.html' %}
{% block title %}Upload PDF and Generate Quiz - QuizGenix{% endblock %}
{% block content %}
<section class="py-16">
  <div class="max-w-md mx-auto px-4 sm:px-6 lg:px-8">
    <h2 class="text-4xl font-extrabold text-center mb-8 animate-fadeInLeft text-transparent bg-clip-text bg-gradient-to-r from-red-400 to-indigo-500">
      Generate Your Quiz
    </h2>
    <form method="post" enctype="multipart/form-data" class="bg-gray-800 bg-opacity-85 p-8 rounded-2xl shadow-xl animate-fadeInLeft" style="animation-delay: 0.1s;">
      {% csrf_token %}
      <div class="mb-5">
        <label for="pdf_file" class="block text-gray-200 text-sm font-medium mb-2">Upload PDF</label>
        <input type="file" name="pdf_file" id="pdf_file" class="input-field w-full px-4 py-3 bg-gray-900 text-white border border-gray-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-500 transition duration-300" required>
      </div>
      <div class="mb-5">
        <label for="subject" class="block text-gray-200 text-sm font-medium mb-2">Subject</label>
        <input type="text" name="subject" id="subject" class="input-field w-full px-4 py-3 bg-gray-900 text-white border border-gray-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-500 transition duration-300" required>
      </div>
      <div class="mb-5">
        <label for="level" class="block text-gray-200 text-sm font-medium mb-2">Complexity Level</label>
        <select name="level" id="level" class="input-field w-full px-4 py-3 bg-gray-900 text-white border border-gray-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-500 transition duration-300">
          <option value="easy">Easy</option>
          <option value="medium">Medium</option>
          <option value="hard">Hard</option>
        </select>
      </div>
      <div class="mb-6">
        <label for="num_mcqs" class="block text-gray-200 text-sm font-medium mb-2">Number of MCQs</label>
        <input type="number" name="num_mcqs" id="num_mcqs" min="1" max="20" class="input-field w-full px-4 py-3 bg-gray-900 text-white border border-gray-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-500 transition duration-300" required>
      </div>
      <button type="submit" class="w-full btn-gradient text-white font-semibold px-6 py-3 rounded-full text-lg transition duration-300 ease-in-out hover-pulseGlow">
        Generate MCQs
      </button>
    </form>
  </div>
</section>
{% endblock %}
