<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Login - QuizGenix</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Custom Animations */
    @keyframes fadeInDown {
      from {
        transform: translateY(-20px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    @keyframes pulseGlow {
      0% { box-shadow: 0 0 5px rgba(45, 212, 191, 0.3); }
      50% { box-shadow: 0 0 15px rgba(45, 212, 191, 0.7); }
      100% { box-shadow: 0 0 5px rgba(45, 212, 191, 0.3); }
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }

    .animate-fadeInDown {
      animation: fadeInDown 0.7s ease-out forwards;
    }

    .hover-pulseGlow:hover {
      animation: pulseGlow 1s ease-in-out infinite;
    }

    .hover-bounce:hover {
      animation: bounce 0.4s ease-in-out;
    }

    .nav-link {
      position: relative;
      transition: color 0.3s ease, transform 0.3s ease;
    }

    .nav-link::before {
      content: '';
      position: absolute;
      width: 0;
      height: 2px;
      bottom: -3px;
      left: 50%;
      transform: translateX(-50%);
      background: linear-gradient(to right, #F87171, #6366F1);
      transition: width 0.3s ease;
    }

    .nav-link:hover::before {
      width: 80%;
    }

    .nav-link:hover {
      color: #F87171;
      transform: scale(1.05);
    }

    .gradient-bg {
      background: linear-gradient(145deg, #111827 0%, #374151 100%);
    }

    .btn-gradient {
      background: linear-gradient(90deg, #F87171, #6366F1);
      transition: background 0.4s ease, transform 0.3s ease;
    }

    .btn-gradient:hover {
      background: linear-gradient(90deg, #6366F1, #F87171);
      transform: translateY(-3px);
    }

    .input-field {
      transition: all 0.3s ease;
    }

    .input-field:focus {
      border-color: #2DD4BF;
      box-shadow: 0 0 12px rgba(45, 212, 191, 0.5);
      transform: translateY(-2px);
    }
  </style>
</head>
<body class="min-h-screen flex flex-col gradient-bg text-white font-sans">
  <!-- Navbar -->
  <nav class="bg-gray-900 bg-opacity-90 backdrop-blur-lg sticky top-0 z-50 shadow-lg">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-16">
        <!-- Logo -->
        <div class="flex-shrink-0">
          <a href="/" class="text-2xl font-extrabold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-red-400 to-indigo-500">
            QuizGenix
          </a>
        </div>
        <!-- Nav Links -->
        <div class="flex space-x-8">
          <a href="/" class="nav-link text-gray-300 hover:text-red-400 px-3 py-2 rounded-md text-sm font-medium hover-bounce">Home</a>
          <a href="/#features" class="nav-link text-gray-300 hover:text-red-400 px-3 py-2 rounded-md text-sm font-medium hover-bounce">Features</a>
          <a href="/#about" class="nav-link text-gray-300 hover:text-red-400 px-3 py-2 rounded-md text-sm font-medium hover-bounce">About</a>
          <a href="/#contact" class="nav-link text-gray-300 hover:text-red-400 px-3 py-2 rounded-md text-sm font-medium hover-bounce">Contact</a>
        </div>
        <!-- CTA Button -->
<div class="flex items-center gap-2 mt-4">
  <a href="{% url 'register' %}" class="inline-block btn-gradient text-white font-semibold px-5 py-2 rounded-full text-sm transition duration-300 ease-in-out hover-pulseGlow">Register</a>
  <a href="{% url 'admin_login' %}" class="inline-block btn-gradient text-white font-semibold px-5 py-2 rounded-full text-sm transition duration-300 ease-in-out hover-pulseGlow">Admin Login</a>
</div>

      </div>
    </div>
  </nav>

  <!-- User Login Section -->
  <section class="flex-grow flex items-center justify-center py-16">
    <div class="max-w-md w-full mx-auto px-4 sm:px-6 lg:px-8">
      <h2 class="text-4xl font-bold text-center mb-8 animate-fadeInDown text-transparent bg-clip-text bg-gradient-to-r from-red-400 to-indigo-500">
        User Login
      </h2>
      {% if msg %}
        <p class="text-center text-lg text-red-400 mb-6 animate-fadeInDown" style="animation-delay: 0.1s;">{{ msg }}</p>
      {% endif %}
      <form method="post" class="bg-gray-800 bg-opacity-85 p-8 rounded-2xl shadow-xl animate-fadeInDown" style="animation-delay: 0.2s;">
        {% csrf_token %}
        <div class="mb-5">
          <label for="name" class="block text-gray-200 text-sm font-medium mb-2">Name</label>
          <input type="text" name="name" id="name" class="input-field w-full px-4 py-3 bg-gray-900 text-white border border-gray-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-500" required>
        </div>
        <div class="mb-6">
          <label for="password" class="block text-gray-200 text-sm font-medium mb-2">Password</label>
          <input type="password" name="password" id="password" class="input-field w-full px-4 py-3 bg-gray-900 text-white border border-gray-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-500" required>
        </div>
        <button type="submit" class="w-full btn-gradient text-white font-semibold px-6 py-3 rounded-full text-lg transition duration-300 ease-in-out hover-pulseGlow">
          Login
        </button>
        <div class="text-center mt-4">
          <a href="{% url 'forgot_password' %}" class="text-red-400 hover:text-indigo-500 text-sm font-medium transition duration-300">Forgot Password?</a>
        </div>
      </form>
      <p class="text-center text-gray-400 mt-6 animate-fadeInDown" style="animation-delay: 0.3s;">
        Don't have an account? <a href="/register" class="text-red-400 hover:text-indigo-500 transition duration-300">Register</a>
      </p>
    </div>
  </section>

  <!-- Footer -->
  <footer class="bg-gray-900 py-6">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center text-gray-400">
      <p>© 2025 QuizGenix. All rights reserved.</p>
    </div>
  </footer>
</body>
</html>
